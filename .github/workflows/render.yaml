name: Render CV and Resume PDFs

# Triggers on any yaml change at the repo root. personal/*.yaml is
# gitignored so it won't trigger here; CI renders the Template_* yamls
# as proof-of-correctness, and downstream consumers fetch those artifacts.
on:
  push:
    branches: [main]
    paths:
      - '*.yaml'
      - 'requirements.txt'
      - 'Makefile'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip + venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            resumecv
          key: ${{ runner.os }}-py313-rendercv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py313-rendercv-

      - name: Install rendercv
        run: make install

      - name: Render CVs
        run: make cv

      - name: Render Resumes
        run: make resume

      - name: Upload CV artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv
          path: '*_CV.pdf'
          if-no-files-found: warn

      - name: Upload Resume artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume
          path: '*_Resume.pdf'
          if-no-files-found: warn

      - name: Upload rendercv_output (Typst / MD / HTML / PNG)
        uses: actions/upload-artifact@v4
        with:
          name: rendercv_output
          path: rendercv_output/
          if-no-files-found: warn
